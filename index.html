<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Somnath Luitel — Climate Researcher & Data Scientist</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        :root {
            /* Earth/Environment/Atmospheric Science Colors */
            --ocean-dark: #0B3B6F;
            --ocean-light: #1E5A96;
            --forest-dark: #1B7946;
            --forest-light: #2D9A6F;
            --sky-light: #E8F4F8;
            --atmosphere-purple: #6B5B95;
            --earth-clay: #A67C52;

            /* Original Colors */
            --ink: #1c1a17;
            --ink-soft: #3a3530;
            --ink-muted: #7a7268;
            --paper: #faf7f2;
            --paper-mid: #f2ede4;
            --paper-dark: #e8e0d0;
            --accent: #2D9A6F;
            --accent-2: #4a6741;
            --accent-lt: #c8d8c0;
            --gold: #9a7a45;
            --gold-lt: #d4b87a;
            --rule: rgba(28,26,23,.1);
            --shadow-sm: 0 2px 12px rgba(11, 59, 111, .08);
            --shadow-md: 0 8px 40px rgba(11, 59, 111, .12);
            --shadow-lg: 0 24px 80px rgba(11, 59, 111, .16);
            --r: 10px;
            --tr: all .28s cubic-bezier(.4,0,.2,1);
            --serif: 'Cormorant Garamond', Georgia, serif;
            --sans: 'DM Sans', system-ui, sans-serif;
            --mono: 'DM Mono', monospace;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--sans);
            background: linear-gradient(135deg, var(--paper) 0%, #f5f0e8 100%);
            color: var(--ink);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        ::selection {
            background: rgba(45, 154, 111, .2);
            color: var(--ocean-dark);
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            transition: var(--tr);
        }

        nav.solid {
            background: rgba(250,247,242,.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--rule);
            box-shadow: var(--shadow-sm);
        }

        .nav-logo {
            font-family: var(--serif);
            font-size: 1.22rem;
            font-weight: 500;
            letter-spacing: .02em;
            text-decoration: none;
            transition: var(--tr);
            white-space: nowrap;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--ocean-dark), var(--forest-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        nav:not(.solid) .nav-logo {
            -webkit-text-fill-color: white;
        }

        .nav-links {
            display: flex;
            gap: 0;
            list-style: none;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-links a {
            text-decoration: none;
            font-size: .77rem;
            font-weight: 400;
            letter-spacing: .07em;
            text-transform: uppercase;
            padding: 8px 14px;
            border-radius: 4px;
            transition: var(--tr);
            white-space: nowrap;
            position: relative;
        }

        nav:not(.solid) .nav-links a {
            color: rgba(255,255,255,.7);
        }

        nav:not(.solid) .nav-links a:hover {
            color: #fff;
            background: rgba(255,255,255,.1);
        }

        nav.solid .nav-links a {
            color: var(--ink-muted);
        }

        nav.solid .nav-links a:hover, nav.solid .nav-links a.act {
            color: var(--accent);
            background: rgba(45, 154, 111, .08);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-shrink: 0;
        }

        .nav-soc {
            display: flex;
            gap: 16px;
        }

        .nav-soc a {
            font-size: .82rem;
            text-decoration: none;
            transition: var(--tr);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 6px;
        }

        nav:not(.solid) .nav-soc a {
            color: rgba(255,255,255,.55);
        }

        nav:not(.solid) .nav-soc a:hover {
            color: #fff;
            background: rgba(255,255,255,.1);
        }

        nav.solid .nav-soc a {
            color: var(--ink-muted);
        }

        nav.solid .nav-soc a:hover {
            color: var(--accent);
            background: rgba(45, 154, 111, .08);
        }

        .ham {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
        }

        .ham span {
            display: block;
            width: 22px;
            height: 1.5px;
            transition: var(--tr);
        }

        nav:not(.solid) .ham span {
            background: rgba(255,255,255,.8);
        }

        nav.solid .ham span {
            background: var(--ink);
        }

        .ham.open span:nth-child(1) {
            transform: translateY(6.5px) rotate(45deg);
        }

        .ham.open span:nth-child(2) {
            opacity: 0;
        }

        .ham.open span:nth-child(3) {
            transform: translateY(-6.5px) rotate(-45deg);
        }

        .mob-panel {
            display: none;
            position: fixed;
            top: 68px;
            left: 0;
            right: 0;
            background: var(--paper);
            border-bottom: 1px solid var(--rule);
            box-shadow: var(--shadow-md);
            z-index: 99;
            padding: 16px 28px 24px;
        }

        .mob-panel.open {
            display: block;
        }

        .mob-panel a {
            display: block;
            text-decoration: none;
            color: var(--ink-soft);
            font-size: .93rem;
            padding: 10px 0;
            border-bottom: 1px solid var(--rule);
            transition: var(--tr);
        }

        .mob-panel a:last-child {
            border-bottom: none;
        }

        .mob-panel a:hover {
            color: var(--accent);
            padding-left: 6px;
        }

        /* HERO */
        #hero {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, var(--ocean-dark) 0%, var(--forest-dark) 100%);
            margin-top: 0;
        }

        #hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(-45deg,transparent,transparent 60px,rgba(255,255,255,.016) 60px,rgba(255,255,255,.016) 61px);
        }

        #hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,.055) 0%, transparent 70%);
            transform: translate(35%, 35%);
        }

        .hero-left {
            background: linear-gradient(135deg, var(--ocean-dark) 0%, var(--forest-dark) 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 88px 52px 72px;
            z-index: 2;
        }

        .h-eyebrow {
            font-family: var(--mono);
            font-size: .67rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: rgba(255,255,255,.8);
            margin-bottom: 18px;
            position: relative;
            z-index: 2;
            opacity: .85;
            animation: fadeInUp .6s ease .2s both;
        }

        .h-name {
            font-family: var(--serif);
            font-size: clamp(2.6rem, 4vw, 4.6rem);
            font-weight: 300;
            line-height: 1.07;
            letter-spacing: -.01em;
            color: #fff;
            position: relative;
            z-index: 2;
            margin-bottom: 28px;
            animation: fadeInUp .6s ease .4s both;
        }

        .h-name em {
            display: block;
            font-style: italic;
            font-size: .55em;
            color: rgba(255,255,255,.6);
            margin-top: 8px;
            letter-spacing: .02em;
        }

        .h-rule {
            width: 36px;
            height: 1px;
            background: var(--gold-lt);
            opacity: .8;
            margin-bottom: 22px;
            position: relative;
            z-index: 2;
            animation: slideInLeft .6s ease .6s both;
        }

        .h-sub {
            font-size: .93rem;
            line-height: 1.78;
            color: rgba(255,255,255,.75);
            max-width: 380px;
            position: relative;
            z-index: 2;
            margin-bottom: 36px;
            animation: fadeInUp .6s ease .8s both;
        }

        .h-sub a {
            color: var(--gold-lt);
            text-decoration: none;
            border-bottom: 1px solid rgba(212,184,122,.35);
            transition: var(--tr);
            font-weight: 500;
        }

        .h-sub a:hover {
            border-color: var(--gold-lt);
        }

        .h-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            position: relative;
            z-index: 2;
            margin-bottom: 36px;
            animation: fadeInUp .6s ease 1s both;
        }

        .pill {
            background: rgba(255,255,255,.09);
            border: 1px solid rgba(255,255,255,.14);
            color: rgba(255,255,255,.78);
            font-size: .7rem;
            letter-spacing: .05em;
            padding: 5px 13px;
            border-radius: 100px;
            transition: var(--tr);
            cursor: default;
        }

        .pill:hover {
            background: rgba(255,255,255,.18);
            transform: translateY(-2px);
        }

        .h-btns {
            display: flex;
            gap: 11px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
            animation: fadeInUp .6s ease 1.2s both;
        }

        .hbtn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-size: .8rem;
            font-weight: 600;
            letter-spacing: .04em;
            padding: 11px 22px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-family: var(--sans);
            transition: var(--tr);
        }

        .hbtn-solid {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #fff;
        }

        .hbtn-solid:hover {
            background: linear-gradient(135deg, var(--accent-2), var(--accent));
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(45, 154, 111, .3);
        }

        .hbtn-outline {
            background: transparent;
            color: rgba(255,255,255,.8);
            border: 1px solid rgba(255,255,255,.28);
        }

        .hbtn-outline:hover {
            background: rgba(255,255,255,.1);
            color: #fff;
            transform: translateY(-3px);
            border-color: #fff;
        }

        .scroll-ind {
            position: absolute;
            bottom: 30px;
            left: 52px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--mono);
            font-size: .6rem;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: rgba(255,255,255,.35);
            z-index: 5;
            animation: fadeIn .8s ease 1.4s both;
        }

        .s-line {
            width: 28px;
            height: 1px;
            background: rgba(255,255,255,.28);
            animation: sl 2s ease-in-out infinite;
        }

        @keyframes sl {
            0%,100%{width:28px;opacity:.3}
            50%{width:44px;opacity:.7}
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .hero-right {
            position: relative;
            background: var(--paper-mid);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero-right::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(28,26,23,.09) 1px, transparent 1px);
            background-size: 22px 22px;
            pointer-events: none;
            z-index: 0;
        }

        .hero-right::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(242,237,228,.55) 100%);
            pointer-events: none;
            z-index: 2;
        }

        .h-portrait-wrap {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            animation: fadeInRight .8s ease .4s both;
        }

        .h-portrait-ring {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 1px solid var(--paper-dark);
            padding: 8px;
            background: var(--paper);
            box-shadow: 0 20px 60px rgba(28,26,23,.13), 0 2px 8px rgba(28,26,23,.06);
            transition: var(--tr);
        }

        .h-portrait-ring:hover {
            box-shadow: 0 28px 80px rgba(11, 59, 111, .18);
            transform: translateY(-4px);
        }

        .h-photo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            object-position: center top;
            display: block;
            filter: grayscale(4%) contrast(1.03);
        }

        .h-portrait-card {
            background: var(--paper);
            border: 1px solid var(--paper-dark);
            border-radius: 8px;
            padding: 14px 28px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            transition: var(--tr);
        }

        .h-portrait-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .h-portrait-card .pc-name {
            font-family: var(--serif);
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--ink);
            letter-spacing: .01em;
        }

        .h-portrait-card .pc-role {
            font-family: var(--mono);
            font-size: .6rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--ink-muted);
            margin-top: 4px;
        }

        .h-accent-bar {
            width: 36px;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
            border-radius: 1px;
            margin-top: 6px;
            opacity: .8;
        }

        /* SHARED */
        section {
            padding: 96px 48px;
        }

        .wrap {
            max-width: 1120px;
            margin: 0 auto;
        }

        .lbl {
            font-family: var(--mono);
            font-size: .63rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--accent);
            display: block;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .sec-h {
            font-family: var(--serif);
            font-size: clamp(1.9rem,3.2vw,2.8rem);
            font-weight: 400;
            line-height: 1.15;
            color: var(--ocean-dark);
            margin-bottom: 10px;
        }

        .sec-s {
            font-size: .93rem;
            color: var(--ink-muted);
            line-height: 1.78;
            max-width: 460px;
        }

        .sh {
            margin-bottom: 52px;
        }

        .sh.c {
            text-align: center;
        }

        .sh.c .sec-s {
            margin: 0 auto;
        }

        hr.rule {
            border: none;
            border-top: 1px solid var(--rule);
        }

        .r {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity .6s ease, transform .6s ease;
        }

        .r.in {
            opacity: 1;
            transform: none;
        }

        /* ABOUT */
        #about {
            background: linear-gradient(180deg, var(--paper) 0%, rgba(232, 244, 248, .4) 100%);
        }

        .about-g {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 80px;
            align-items: start;
        }

        .portrait-col {
            position: sticky;
            top: 84px;
        }

        .portrait {
            border-radius: var(--r);
            overflow: hidden;
            aspect-ratio: 4/5;
            background: var(--paper-dark);
            box-shadow: var(--shadow-lg);
            transition: var(--tr);
        }

        .portrait:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-4px);
        }

        .portrait img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
            transition: var(--tr);
            filter: brightness(1);
        }

        .portrait:hover img {
            filter: brightness(1.05);
        }

        .p-caption {
            font-family: var(--serif);
            font-style: italic;
            font-size: .86rem;
            color: var(--ink-muted);
            margin-top: 13px;
            line-height: 1.6;
        }

        .loc {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: .74rem;
            color: var(--accent);
            font-weight: 600;
            margin-top: 9px;
        }

        .loc i {
            font-size: .68rem;
        }

        .about-pull {
            font-family: var(--serif);
            font-size: 1.38rem;
            font-weight: 400;
            line-height: 1.68;
            color: var(--ocean-dark);
            font-style: italic;
            border-left: 3px solid var(--accent);
            padding-left: 18px;
            margin-bottom: 26px;
        }

        .abody {
            font-size: .95rem;
            line-height: 1.85;
            color: var(--ink-muted);
            margin-bottom: 18px;
        }

        .abody strong {
            color: var(--ocean-dark);
            font-weight: 600;
        }

        .abody a {
            color: var(--accent-2);
            text-decoration: none;
            border-bottom: 1px solid rgba(74,103,65,.25);
            transition: var(--tr);
            font-weight: 500;
        }

        .abody a:hover {
            border-color: var(--accent-2);
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin: 26px 0;
        }

        .sk {
            font-size: .76rem;
            color: var(--ocean-dark);
            background: rgba(11, 59, 111, .08);
            border: 1px solid rgba(11, 59, 111, .15);
            border-radius: 4px;
            padding: 5px 11px;
            transition: var(--tr);
            cursor: default;
            font-weight: 500;
        }

        .sk:hover {
            background: linear-gradient(135deg, var(--ocean-dark), var(--forest-dark));
            color: #fff;
            border-color: transparent;
            transform: translateY(-2px);
        }

        .a-stats {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 1px;
            background: var(--rule);
            border: 1px solid var(--rule);
            border-radius: var(--r);
            overflow: hidden;
            margin-top: 30px;
        }

        .sc {
            background: var(--paper);
            padding: 22px 18px;
            text-align: center;
            transition: var(--tr);
        }

        .sc:hover {
            background: rgba(232, 244, 248, .8);
            border-left: 3px solid var(--accent);
        }

        .sc .n {
            font-family: var(--serif);
            font-size: 2.1rem;
            font-weight: 300;
            color: var(--ocean-dark);
            display: block;
            line-height: 1;
        }

        .sc .l {
            font-size: .68rem;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--ink-muted);
            margin-top: 5px;
            display: block;
        }

        /* PROJECTS */
        #projects {
            background: var(--paper-mid);
        }

        .proj-g {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 2px;
            background: var(--rule);
            border: 1px solid var(--rule);
            border-radius: var(--r);
            overflow: hidden;
        }

        .pc {
            background: var(--paper);
            padding: 38px 34px;
            transition: var(--tr);
            position: relative;
        }

        .pc:hover {
            background: var(--paper-mid);
            box-shadow: 0 8px 24px rgba(11, 59, 111, .12);
            transform: translateY(-3px);
        }

        .pc-n {
            font-family: var(--mono);
            font-size: .62rem;
            letter-spacing: .14em;
            color: var(--ink-muted);
            margin-bottom: 18px;
            display: block;
        }

        .pc-tag {
            display: inline-block;
            font-family: var(--mono);
            font-size: .58rem;
            letter-spacing: .12em;
            text-transform: uppercase;
            background: var(--paper-dark);
            color: var(--ink-muted);
            padding: 3px 9px;
            border-radius: 3px;
            margin-bottom: 14px;
        }

        .pc-icon {
            font-size: 1.5rem;
            margin-bottom: 14px;
            display: block;
        }

        .pc h3 {
            font-family: var(--serif);
            font-size: 1.3rem;
            font-weight: 500;
            color: var(--ocean-dark);
            margin-bottom: 9px;
            line-height: 1.3;
        }

        .pc p {
            font-size: .86rem;
            line-height: 1.78;
            color: var(--ink-muted);
            margin-bottom: 18px;
        }

        .pl {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            font-size: .76rem;
            font-weight: 600;
            letter-spacing: .05em;
            text-transform: uppercase;
            color: var(--accent);
            border-bottom: 1px solid var(--accent-lt);
            padding-bottom: 1px;
            transition: var(--tr);
        }

        .pl:hover {
            gap: 10px;
            border-color: var(--accent);
        }

        /* PUBLICATIONS */
        #publications {
            background: var(--paper);
        }

        .pub-l {

            flex-direction: column;

            padding: 34px 0;

            background: rgba(232, 244, 248, .3);
        }

        .p-idx {
            font-family: var(--serif);
            font-size: 1.9rem;
            font-weight: 300;
            color: var(--paper-dark);
            line-height: 1;
            text-align: right;
            padding-top: 4px;
            transition: var(--tr);

            color: var(--accent);
        }

        .p-body h3 {
            font-family: var(--serif);
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--ocean-dark);
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .p-body h3 a {
            text-decoration: none;
            color: inherit;
            transition: var(--tr);
        }

        .p-body h3 a:hover {
            color: var(--accent);
        }

            color: var(--ink-muted);

            align-self: start;
            margin-top: 3px;

        .btab.act {
            color: var(--accent);
            border-bottom-color: var(--accent);

            overflow: hidden;

            display: flex;

            flex: 1;

        .bc h3 a {
            text-decoration: none;
            color: inherit;

            margin-bottom: 18px;

        .b-read {
