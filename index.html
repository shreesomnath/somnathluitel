<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somnath Luitel — Civil Engineer & Researcher</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Earth/Environment/Atmospheric Science Palette */
            --ocean-dark: #0B3B6F;
            --ocean-light: #1E5A96;
            --forest-dark: #1B7946;
            --forest-light: #2D9A6F;
            --sky-light: #E3F2FD;
            --sky-medium: #87CEEB;
            --atmosphere: #6B5B95;
            --earth-clay: #A67C52;
            --earth-soil: #8B6F47;
            --accent-teal: #00A89D;
            --accent-bright: #16B5A8;

            /* Original complementary colors */
            --ink: #1c1a17;
            --ink-soft: #3a3530;
            --ink-muted: #7a7268;
            --paper: #faf7f2;
            --paper-mid: #f2ede4;
            --paper-dark: #e8e0d0;
            --gold: #9a7a45;
            --gold-lt: #d4b87a;
            --rule: rgba(28,26,23,.1);

            /* Shadows */
            --shadow-sm: 0 2px 12px rgba(11, 59, 111, .08);
            --shadow-md: 0 8px 40px rgba(11, 59, 111, .12);
            --shadow-lg: 0 24px 80px rgba(11, 59, 111, .16);
            --shadow-xl: 0 32px 120px rgba(11, 59, 111, .20);

            /* Transitions */
            --tr: all .3s cubic-bezier(.4,0,.2,1);
            --tr-slow: all .6s cubic-bezier(.34,.1,.68,.55);

            /* Typography */
            --serif: 'Cormorant Garamond', Georgia, serif;
            --sans: 'DM Sans', system-ui, sans-serif;
            --mono: 'DM Mono', monospace;

            /* Spacing */
            --r: 12px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--sans);
            background: linear-gradient(135deg, var(--paper) 0%, #f5f0e8 100%);
            color: var(--ink);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(30, 90, 150, .03) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(29, 154, 111, .03) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        ::selection {
            background: rgba(22, 181, 168, .2);
            color: var(--ocean-dark);
        }

        /* ═══════════════════════════════════════════════════════════ */
        /* NAVIGATION */
        /* ═══════════════════════════════════════════════════════════ */

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            transition: var(--tr);
            background: transparent;
        }

        nav.solid {
            background: rgba(250, 247, 242, .96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--rule);
            box-shadow: var(--shadow-sm);
        }

        .nav-logo {
            font-family: var(--serif);
            font-size: 1.3rem;
            font-weight: 500;
            letter-spacing: .02em;
            text-decoration: none;
            transition: var(--tr);
            white-space: nowrap;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--ocean-dark), var(--forest-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        nav:not(.solid) .nav-logo {
            -webkit-text-fill-color: white;
            background: linear-gradient(135deg, rgba(255,255,255,1), rgba(255,255,255,.9));
            -webkit-background-clip: text;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 0;
            list-style: none;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-links a {
            text-decoration: none;
            font-size: .75rem;
            font-weight: 500;
            letter-spacing: .08em;
            text-transform: uppercase;
            padding: 10px 16px;
            border-radius: 6px;
            transition: var(--tr);
            white-space: nowrap;
            position: relative;
        }

        nav:not(.solid) .nav-links a {
            color: rgba(255, 255, 255, .75);
        }

        nav:not(.solid) .nav-links a:hover {
            color: #fff;
            background: rgba(255, 255, 255, .1);
        }

        nav.solid .nav-links a {
            color: var(--ink-muted);
        }

        nav.solid .nav-links a:hover,
        nav.solid .nav-links a.act {
            color: var(--accent-teal);
            background: rgba(0, 168, 157, .08);
        }

        /* Animated underline effect */
        nav.solid .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 8px;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--ocean-dark), var(--accent-teal));
            transform: translateX(-50%);
            transition: width .3s ease;
        }

        nav.solid .nav-links a:hover::after,
        nav.solid .nav-links a.act::after {
            width: 100%;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-shrink: 0;
        }

        .nav-soc {
            display: flex;
            gap: 16px;
        }

        .nav-soc a {
            font-size: .85rem;
            text-decoration: none;
            transition: var(--tr);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 8px;
        }

        nav:not(.solid) .nav-soc a {
            color: rgba(255, 255, 255, .6);
        }

        nav:not(.solid) .nav-soc a:hover {
            color: #fff;
            background: rgba(255, 255, 255, .1);
        }

        nav.solid .nav-soc a {
            color: var(--ink-muted);
        }

        nav.solid .nav-soc a:hover {
            color: var(--accent-teal);
            background: rgba(0, 168, 157, .08);
        }

        .ham {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
        }

        .ham span {
            display: block;
            width: 22px;
            height: 1.5px;
            transition: var(--tr);
        }

        nav:not(.solid) .ham span {
            background: rgba(255, 255, 255, .8);
        }

        nav.solid .ham span {
            background: var(--ink);
        }

        .ham.open span:nth-child(1) {
            transform: translateY(6.5px) rotate(45deg);
        }

        .ham.open span:nth-child(2) {
            opacity: 0;
        }

        .ham.open span:nth-child(3) {
            transform: translateY(-6.5px) rotate(-45deg);
        }

        .mob-panel {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            background: var(--paper);
            border-bottom: 1px solid var(--rule);
            box-shadow: var(--shadow-md);
            z-index: 99;
            padding: 16px 28px 24px;
        }

        .mob-panel.open {
            display: block;
            animation: slideDown .3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .mob-panel a {
            display: block;
            text-decoration: none;
            color: var(--ink-soft);
            font-size: .93rem;
            padding: 12px 0;
            border-bottom: 1px solid var(--rule);
            transition: var(--tr);
        }

        .mob-panel a:last-child {
            border-bottom: none;
        }

        .mob-panel a:hover {
            color: var(--accent-teal);
            padding-left: 8px;
        }

        /* ═══════════════════════════════════════════════════════════ */
        /* HERO SECTION */
        /* ═══════════════════════════════════════════════════════════ */

        #hero {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            position: relative;
            overflow: hidden;
            margin-top: 70px;
            background: linear-gradient(135deg, var(--ocean-dark) 0%, var(--forest-dark) 100%);
        }

        #hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, .1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 168, 157, .1) 0%, transparent 50%);
            pointer-events: none;
        }

        #hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(-45deg, transparent, transparent 80px, rgba(255, 255, 255, .008) 80px, rgba(255, 255, 255, .008) 81px);
            pointer-events: none;
        }

        .hero-left {
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 88px 52px 72px;
            z-index: 2;
        }

        .h-eyebrow {
            font-family: var(--mono);
            font-size: .7rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .7);
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
            opacity: .9;
            animation: fadeInUp .8s ease .2s both;
        }

        .h-name {
            font-family: var(--serif);
            font-size: clamp(2.8rem, 5vw, 5.2rem);
            font-weight: 300;
            line-height: 1.05;
            letter-spacing: -.01em;
            color: #fff;
            position: relative;
            z-index: 2;
            margin-bottom: 28px;
            animation: fadeInUp .8s ease .4s both;
        }

        .h-name em {
            display: block;
            font-style: italic;
            font-size: .5em;
            color: rgba(255, 255, 255, .65);
            margin-top: 10px;
            letter-spacing: .02em;
            font-weight: 300;
        }

        .h-rule {
            width: 48px;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-bright), transparent);
            margin-bottom: 26px;
            position: relative;
            z-index: 2;
            animation: slideInLeft .8s ease .6s both;
        }

        .h-sub {
            font-size: .96rem;
            line-height: 1.8;
            color: rgba(255, 255, 255, .75);
            max-width: 360px;
            position: relative;
            z-index: 2;
            margin-bottom: 40px;
            animation: fadeInUp .8s ease .8s both;
        }

        .h-sub a {
            color: var(--accent-bright);
            text-decoration: none;
            border-bottom: 1px solid rgba(22, 181, 168, .4);
            transition: var(--tr);
            font-weight: 500;
        }

        .h-sub a:hover {
            border-color: var(--accent-bright);
            text-decoration: underline;
        }

        .h-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            position: relative;
            z-index: 2;
            margin-bottom: 40px;
            animation: fadeInUp .8s ease 1s both;
        }

        .pill {
            background: rgba(255, 255, 255, .1);
            border: 1px solid rgba(255, 255, 255, .2);
            color: rgba(255, 255, 255, .85);
            font-size: .72rem;
            letter-spacing: .05em;
            padding: 7px 15px;
            border-radius: 24px;
            transition: var(--tr);
            cursor: default;
            backdrop-filter: blur(10px);
        }

        .pill:hover {
            background: rgba(22, 181, 168, .2);
            border-color: rgba(22, 181, 168, .5);
            color: #fff;
            transform: translateY(-2px);
        }

        .h-btns {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
            animation: fadeInUp .8s ease 1.2s both;
        }

        .hbtn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-size: .82rem;
            font-weight: 600;
            letter-spacing: .05em;
            padding: 13px 28px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-family: var(--sans);
            transition: var(--tr);
            position: relative;
            overflow: hidden;
        }

        .hbtn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, .2);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform .3s ease;
        }

        .hbtn:hover::before {
            transform: scaleX(1);
        }

        .hbtn-solid {
            background: linear-gradient(135deg, var(--accent-bright), var(--accent-teal));
            color: #fff;
            position: relative;
            z-index: 1;
        }

        .hbtn-solid:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(22, 181, 168, .3);
        }

        .hbtn-outline {
            background: transparent;
            color: #fff;
            border: 2px solid rgba(255, 255, 255, .4);
        }

        .hbtn-outline:hover {
            background: rgba(255, 255, 255, .1);
            border-color: #fff;
            transform: translateY(-3px);
        }

        .scroll-ind {
            position: absolute;
            bottom: 40px;
            left: 52px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: var(--mono);
            font-size: .62rem;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .4);
            z-index: 5;
            animation: fadeIn .8s ease 1.4s both;
        }

        .s-line {
            width: 24px;
            height: 1px;
            background: rgba(255, 255, 255, .4);
            animation: expandLine 2s ease-in-out infinite;
        }

        @keyframes expandLine {
            0%, 100% { width: 24px; opacity: .3; }
            50% { width: 48px; opacity: .8; }
        }

        /* Hero right */
        .hero-right {
            position: relative;
            background: linear-gradient(135deg, rgba(227, 242, 253, .95), rgba(232, 224, 208, .95));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero-right::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(27, 121, 70, .08) 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: 0;
        }

        .hero-right::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(11, 59, 111, .05) 100%);
            pointer-events: none;
            z-index: 1;
        }

        .h-portrait-wrap {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            animation: fadeInRight .8s ease .4s both;
        }

        .h-portrait-ring {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 2px solid var(--forest-light);
            padding: 10px;
            background: linear-gradient(135deg, #fff, rgba(255,255,255,.8));
            box-shadow: 0 24px 72px rgba(11, 59, 111, .18), 0 4px 12px rgba(11, 59, 111, .1);
            position: relative;
            overflow: hidden;
        }

        .h-portrait-ring::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(27, 121, 70, .1), transparent);
            pointer-events: none;
        }

        .h-photo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            object-position: center top;
            display: block;
            filter: grayscale(3%) contrast(1.05) brightness(1.02);
        }

        .h-portrait-card {
            background: rgba(255, 255, 255, .95);
            border: 1px solid rgba(27, 121, 70, .15);
            border-radius: 12px;
            padding: 18px 36px;
            text-align: center;
            box-shadow: 0 12px 40px rgba(11, 59, 111, .1);
            backdrop-filter: blur(10px);
        }

        .h-portrait-card .pc-name {
            font-family: var(--serif);
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--ocean-dark);
            letter-spacing: .01em;
        }

        .h-portrait-card .pc-role {
            font-family: var(--mono);
            font-size: .62rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--ink-muted);
            margin-top: 6px;
        }

        .h-accent-bar {
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, var(--ocean-dark), var(--accent-teal));
            border-radius: 1px;
            margin: 8px auto 0;
            opacity: .8;
        }

        /* ═══════════════════════════════════════════════════════════ */
        /* SHARED STYLES */
        /* ═══════════════════════════════════════════════════════════ */

        section {
            padding: 100px 48px;
            position: relative;
        }

        .wrap {
            max-width: 1140px;
            margin: 0 auto;
        }

        .lbl {
            font-family: var(--mono);
            font-size: .65rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--accent-teal);
            display: block;
            margin-bottom: 14px;
            font-weight: 600;
        }

        .sec-h {
            font-family: var(--serif);
            font-size: clamp(2rem, 3.5vw, 3rem);
            font-weight: 400;
            line-height: 1.15;
            color: var(--ocean-dark);
            margin-bottom: 12px;
        }

        .sec-s {
            font-size: .95rem;
            color: var(--ink-muted);
            line-height: 1.8;
            max-width: 480px;
        }

        .sh {
            margin-bottom: 56px;
        }

        .sh.c {
            text-align: center;
        }

        .sh.c .sec-s {
            margin: 0 auto;
        }

        hr.rule {
            border: none;
            border-top: 1px solid var(--rule);
        }

        .r {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity .7s cubic-bezier(.34,.1,.68,.55), transform .7s cubic-bezier(.34,.1,.68,.55);
        }

        .r.in {
            opacity: 1;
            transform: translateY(0);
        }

        /* Staggered animation for children */
        .r-stagger > * {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity .6s cubic-bezier(.34,.1,.68,.55), transform .6s cubic-bezier(.34,.1,.68,.55);
        }

        .r-stagger.in > * {
            opacity: 1;
            transform: translateY(0);
        }

        .r-stagger > *:nth-child(1) { transition-delay: 0s; }
        .r-stagger > *:nth-child(2) { transition-delay: .1s; }
        .r-stagger > *:nth-child(3) { transition-delay: .2s; }
        .r-stagger > *:nth-child(4) { transition-delay: .3s; }
        .r-stagger > *:nth-child(5) { transition-delay: .4s; }
        .r-stagger > *:nth-child(6) { transition-delay: .5s; }

        /* ═══════════════════════════════════════════════════════════ */
        /* ABOUT SECTION */
        /* ═══════════════════════════════════════════════════════════ */

        #about {
            background: linear-gradient(180deg, var(--paper) 0%, rgba(227, 242, 253, .4) 100%);
        }

        .about-g {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 100px;
            align-items: start;
        }

        .portrait-col {
            position: sticky;
            top: 120px;
        }

        .portrait {
            border-radius: var(--r);
            overflow: hidden;
            aspect-ratio: 4/5;
            background: linear-gradient(135deg, var(--sky-light), var(--paper-dark));
            box-shadow: var(--shadow-lg);
            transition: var(--tr);
            position: relative;
        }

        .portrait:hover {
            box-shadow: var(--shadow-xl);
            transform: translateY(-4px);
        }

        .portrait img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
            filter: grayscale(2%) contrast(1.05);
        }

        .p-caption {
            font-family: var(--serif);
            font-style: italic;
            font-size: .9rem;
            color: var(--ink-muted);
            margin-top: 16px;
            line-height: 1.65;
        }

        .loc {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: .76rem;
            color: var(--forest-light);
            font-weight: 600;
            margin-top: 12px;
        }

        .loc i {
            font-size: .7rem;
        }

        .about-pull {
            font-family: var(--serif);
            font-size: 1.45rem;
            font-weight: 400;
            line-height: 1.7;
            color: var(--ocean-dark);
            font-style: italic;
            border-left: 3px solid var(--accent-teal);
            padding-left: 22px;
            margin-bottom: 32px;
        }

        .abody {
            font-size: .96rem;
            line-height: 1.88;
            color: var(--ink-muted);
            margin-bottom: 22px;
        }

        .abody strong {
            color: var(--ocean-dark);
            font-weight: 600;
        }

        .abody a {
            color: var(--forest-light);
            text-decoration: none;
            border-bottom: 2px solid rgba(29, 154, 111, .3);
            transition: var(--tr);
            font-weight: 500;
        }

        .abody a:hover {
            border-color: var(--forest-light);
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 32px 0;
        }

        .sk {
            font-size: .78rem;
            color: var(--ocean-dark);
            background: rgba(30, 90, 150, .08);
            border: 1px solid rgba(30, 90, 150, .2);
            border-radius: 6px;
            padding: 6px 14px;
            transition: var(--tr);
            cursor: default;
            font-weight: 500;
        }

        .sk:hover {
            background: linear-gradient(135deg, var(--ocean-dark), var(--forest-dark));
            color: #fff;
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(11, 59, 111, .2);
        }

        .a-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            background: var(--rule);
            border: 1px solid var(--rule);
            border-radius: var(--r);
            overflow: hidden;
            margin-top: 40px;
        }

        .sc {
            background: rgba(255, 255, 255, .7);
            padding: 28px 22px;
            text-align: center;
            transition: var(--tr);
            border-left: 3px solid transparent;
        }

        .sc:hover {
            background: #fff;
            border-left-color: var(--accent-teal);
            transform: translateY(-2px);
        }

        .sc .n {
            font-family: var(--serif);
            font-size: 2.4rem;
            font-weight: 300;
            color: var(--ocean-dark);
            display: block;
            line-height: 1;
        }

        .sc .l {
            font-size: .7rem;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--ink-muted);
            margin-top: 8px;
            display: block;
            font-weight: 600;
        }

        /* ═══════════════════════════════════════════════════════════ */
        /* EXPERIENCE TIMELINE (NEW SECTION) */
        /* ═══════════════════════════════════════════════════════════ */

        #timeline {
            background: linear-gradient(180deg, rgba(227, 242, 253, .3) 0%, var(--paper) 100%);
        }

        .timeline-container {
            position: relative;
            padding: 40px 0;
            max-width: 900px;
            margin: 0 auto;
        }

        .timeline-container::before {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;
            background: linear-gradient(180deg, var(--accent-teal), var(--forest-light));
            top: 0;
        }

        .timeline-item {
            margin-bottom: 40px;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity .6s ease, transform .6s ease;
        }

        .timeline-item.in {
            opacity: 1;
            transform: translateY(0);
        }

        .timeline-item:nth-child(odd) {
            margin-left: 0;
            margin-right: 52%;
            text-align: right;
        }

        .timeline-item:nth-child(even) {
            margin-left: 52%;
            margin-right: 0;
            text-align: left;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: white;
            border: 3px solid var(--accent-teal);
            border-radius: 50%;
            top: 0;
            transition: var(--tr);
        }

        .timeline-item:nth-child(odd)::before {
            right: -40px;
        }

        .timeline-item:nth-child(even)::before {
            left: -40px;
        }

        .timeline-item:hover::before {
            width: 24px;
            height: 24px;
            border-color: var(--ocean-dark);
            box-shadow: 0 0 0 6px rgba(11, 59, 111, .1);
            transform: scale(1.2);
        }

        .timeline-content {
            background: white;
            padding: 24px 28px;
            border-radius: var(--r);
            box-shadow: 0 4px 16px rgba(11, 59, 111, .08);
            border-left: 3px solid var(--accent-teal);
            transition: var(--tr);
        }

        .timeline-item:hover .timeline-content {
            box-shadow: 0 12px 40px rgba(11, 59, 111, .15);
            transform: translateY(-4px);
        }

        .timeline-year {
            font-family: var(--mono);
            font-size: .75rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--accent-teal);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .timeline-title {
            font-family: var(--serif);
            font-size: 1.2rem;
            color: var(--ocean-dark);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .timeline-desc {
            font-size: .9rem;
            color: var(--ink-muted);
            line-height: 1.6;
        }

        .techstack-grid {

        .tech-card {
            background: white;
            border-radius: var(--r);
            padding: 32px;
            box-shadow: 0 4px 16px rgba(11, 59, 111, .08);

            transition: var(--tr);
            cursor: default;
            opacity: 0;
            transform: translateY(24px);
        }

        .tech-card.in {
            opacity: 1;
            transform: translateY(0);
        }

        .tech-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 48px rgba(11, 59, 111, .15);
            border-color: var(--accent-teal);
        }

        .tech-icon {
            font-size: 2.4rem;
            margin-bottom: 16px;
            display: inline-block;
            background: linear-gradient(135deg, var(--ocean-dark), var(--forest-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tech-card h3 {
            font-family: var(--serif);
            font-size: 1.15rem;
            color: var(--ocean-dark);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .tech-card p {
            font-size: .9rem;
            color: var(--ink-muted);
            line-height: 1.7;
            margin-bottom: 16px;
        }
